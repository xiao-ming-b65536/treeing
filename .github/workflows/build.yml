name: Build

# Build English-release binaries for Windows / Linux / macOS ARM / macOS x86
# and attach them to the GitHub Release for the tag that triggered this run.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.1, without the v prefix)'
        required: true
        default: '1.0.1'
      publish:
        description: 'Publish / update the GitHub Release for this version. Leave unchecked to build and stage artifacts without touching any release.'
        type: boolean
        required: false
        default: false

permissions:
  contents: read

jobs:
  build:
    name: package (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    # macos-15-intel (x86_64) runners are scarcer than ARM; allow it to fail without blocking the others.
    continue-on-error: ${{ matrix.platform == 'macos-x86_64' }}
    env:
      # Windows runners default stdout to cp1252; force UTF-8 so the English strings print consistently.
      PYTHONUTF8: '1'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux
          # Pin macos-15 (not macos-latest) so arm64 artifacts stay compatible with macOS 11+.
          - os: macos-15
            platform: macos-arm64
          # The only x86_64 macOS runner currently available (through 2027-08).
          - os: macos-15-intel
            platform: macos-x86_64

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Tk and xvfb (Linux GUI)
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk xvfb

      - name: Install build dependencies
        run: pip install -r requirements-build.txt

      - name: Build CLI and GUI
        run: python build.py --target all

      - name: Verify artifact sizes
        shell: bash
        run: |
          set -euo pipefail
          MIN=100000
          if [ "${{ matrix.platform }}" = "windows" ]; then
            cli=dist/windows/treeing-cli.exe
            gui=dist/windows/treeing-gui.exe
          else
            cli=dist/${{ matrix.platform }}/treeing-cli
            gui=dist/${{ matrix.platform }}/treeing-gui
          fi
          test -f "$cli"
          test -f "$gui"
          test "$(wc -c < "$cli")" -ge "$MIN"
          test "$(wc -c < "$gui")" -ge "$MIN"

      - name: Smoke test CLI
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "windows" ]; then
            dist/windows/treeing-cli.exe --help
          else
            dist/${{ matrix.platform }}/treeing-cli --help
          fi

      - name: Smoke test GUI (Linux xvfb)
        if: matrix.platform == 'linux'
        run: xvfb-run -a timeout 8 dist/linux/treeing-gui || test $? -eq 124

      - name: Smoke test GUI (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $p = Start-Process -FilePath dist/windows/treeing-gui.exe -PassThru
          Start-Sleep -Seconds 5
          if ($p.HasExited) {
            throw "treeing-gui exited early with code $($p.ExitCode)"
          }
          Stop-Process -Id $p.Id -Force

      - name: Smoke test GUI (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          dist/${{ matrix.platform }}/treeing-gui &
          GUI_PID=$!
          sleep 8
          if kill -0 $GUI_PID 2>/dev/null; then
            kill $GUI_PID
            wait $GUI_PID 2>/dev/null || true
          else
            echo "treeing-gui exited early"
            exit 1
          fi

      - name: Compute version string
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "tag=v$V" >> $GITHUB_OUTPUT

      - name: Package artifacts
        shell: bash
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p staging
          if [ "${{ matrix.platform }}" = "windows" ]; then
            7z a "staging/treeing-cli-windows-v${VERSION}.zip"  dist/windows/treeing-cli.exe
            7z a "staging/treeing-gui-windows-v${VERSION}.zip"  dist/windows/treeing-gui.exe
          else
            tar -czf "staging/treeing-cli-${{ matrix.platform }}-v${VERSION}.tar.gz" -C dist/${{ matrix.platform }} treeing-cli
            tar -czf "staging/treeing-gui-${{ matrix.platform }}-v${VERSION}.tar.gz" -C dist/${{ matrix.platform }} treeing-gui
          fi
          ls -la staging/

      - name: Build wheel and sdist
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          pip install build
          # Avoid `python -m build`: build.py in the current directory shadows the build package;
          # use the pyproject-build entry point provided by the build package instead.
          # Output to a separate pypi/ dir so the wheel/sdist stay distinct from the
          # platform binary tarballs in staging/ (avoids accidentally uploading a Linux
          # binary as an sdist to PyPI).
          pyproject-build --wheel --sdist --outdir pypi .

      - uses: actions/upload-artifact@v6
        with:
          name: artifacts-${{ matrix.platform }}
          path: staging/*
          if-no-files-found: error

      - name: Upload PyPI distributions
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-pypi
          path: pypi/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    # Tag pushes always publish. A manual workflow_dispatch only publishes when
    # the publish input is explicitly set, so a stray dispatch with the default
    # version can't silently overwrite an already-released version's assets
    # (PyInstaller binaries aren't bit-reproducible).
    if: always() && needs.build.result == 'success' && (github.event_name == 'push' || github.event.inputs.publish == 'true')
    permissions:
      contents: write
    steps:
      - name: Compute version string
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "tag=v$V" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          cd artifacts
          find . -type f \( -name '*.zip' -o -name '*.tar.gz' -o -name '*.whl' -o -name '*.tar.gz' \) -print0 \
            | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
          echo "=== SHA256SUMS.txt ==="
          cat SHA256SUMS.txt
          echo "=== artifacts list ==="
          ls -la

      - name: Create release bundle
        shell: bash
        run: |
          mkdir -p release-bundle
          cp artifacts/* release-bundle/
          ls -la release-bundle/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: release-bundle/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pypi:
    needs: build
    runs-on: ubuntu-latest
    # Publish to PyPI only on real tag pushes. PyPI rejects re-uploading a
    # version, so manual dispatches never trigger this (use a new tag instead).
    if: always() && needs.build.result == 'success' && github.event_name == 'push'
    environment:
      name: pypi
      url: https://pypi.org/p/treeing
    permissions:
      id-token: write  # trusted publishing (OIDC); no API token needed
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: artifacts-pypi
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
